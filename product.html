<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Детали товара - Really Brand</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .product-detail-container { padding: 40px 0; display: grid; gap: 40px; }
    @media (min-width: 768px) { .product-detail-container { grid-template-columns: 1.2fr 1fr; } }
    .product-detail-media img, .product-detail-media video { width: 100%; border-radius: 12px; }
    .product-detail-info h1 { font-size: 24px; text-transform: uppercase; margin-bottom: 10px; font-weight: 900; }
    .product-detail-price { font-size: 22px; font-weight: 700; margin-bottom: 30px; }
    .option-group { margin-bottom: 25px; }
    .option-group label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #999; margin-bottom: 10px; }
    .option-list { display: flex; gap: 10px; flex-wrap: wrap; }
    .option-item { padding: 10px 20px; border: 1px solid #eee; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .option-item.selected { border-color: #000; background: #000; color: #fff; }
    .product-detail-description { margin-top: 40px; line-height: 1.8; color: #444; }
    .product-detail-description img { width: 100%; margin-bottom: 10px; border-radius: 8px; }
    .gallery-grid { display: grid; gap: 10px; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">Really Brand</a>
        <div class="header-right">
          <button class="icon-btn" onclick="location.href='index.html'">🏠</button>
          <button class="icon-btn cart-btn" onclick="openCart()">
            🛒 <span class="cart-count">0</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="product-detail-content" class="product-detail-container">
      <!-- Content injected here -->
      <p style="padding: 100px 0; text-align: center;">Загрузка...</p>
    </div>
  </main>

  <div class="modal" id="cart-modal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('cart-modal')">×</button>
      <h3 style="text-transform: uppercase;">Корзина</h3>
      <div id="cart-items" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Итого</span>
          <span id="cart-total">₽ 0</span>
        </div>
        <button class="whatsapp-btn" onclick="sendWhatsApp()">
          Заказать через WhatsApp
        </button>
      </div>
    </div>
  </div>

  <footer style="padding: 60px 0; text-align: center; border-top: 1px solid var(--border); margin-top: 40px;">
    <p style="font-size: 12px; color: #999;">© 2026 Really Brand. Все права защищены.</p>
  </footer>

  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Specific logic for detail page
    async function loadProductDetail() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      if (!id) {
        window.location.href = 'index.html';
        return;
      }

      const { data: product, error } = await supabaseClient
        .from('products')
        .select('*')
        .eq('id', id)
        .single();

      if (error || !product) {
        document.getElementById('product-detail-content').innerHTML = '<p style="padding: 100px 0; text-align: center;">Товар не найден.</p>';
        return;
      }

      const content = document.getElementById('product-detail-content');
      content.innerHTML = `
        <div class="product-detail-media">
          ${product.video_url 
            ? `<video src="${product.video_url}" autoplay loop muted playsinline></video>` 
            : `<img src="${product.image_url || 'https://via.placeholder.com/600x800'}" alt="${product.name}">`
          }
        </div>
        <div class="product-detail-info">
          <h1>${product.name}</h1>
          <div class="product-detail-price">₽ ${product.price.toLocaleString()}</div>

          <button class="add-btn" style="padding: 20px;" onclick="addToCart('${product.id}')" ${product.is_sold_out ? 'disabled' : ''}>
            ${product.is_sold_out ? 'Нет в наличии' : 'Добавить в корзину'}
          </button>

          <div style="margin-top: 20px; font-size: 13px; color: #888;">
            Категория: ${product.category}
          </div>
          
          <div class="product-detail-description">
            ${product.detail_html || ''}
          </div>
        </div>
      `;

      document.querySelectorAll('.option-item').forEach(item => {
        item.addEventListener('click', () => {
          item.parentElement.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
        });
      });
    }

    // Override the alert in app.js
    window.openProductDetail = (id) => {
      window.location.href = `product.html?id=${id}`;
    };

    if (window.location.pathname.includes('product.html')) {
      document.addEventListener('DOMContentLoaded', loadProductDetail);
    }
  </script>
</body>
</html>
