<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Really Brand - Official Store</title>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Inline critical styles for layout until style.css is fully defined */
    :root {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #666666;
      --border: #eeeeee;
      --accent: #000000;
      --glass-bg: rgba(255, 255, 255, 0.9);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    
    header { position: sticky; top: 0; background: var(--glass-bg); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--border); }
    .header-content { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
    .logo { font-size: 22px; font-weight: 800; text-transform: uppercase; text-decoration: none; color: var(--text); letter-spacing: 2px; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .icon-btn { background: none; border: none; cursor: pointer; font-size: 20px; }
    .cart-btn { position: relative; }
    .cart-count { position: absolute; top: -5px; right: -10px; background: var(--text); color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }

    /* NEW Section */
    .new-section { padding: 40px 0; }
    .new-section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: var(--text-muted); }
    .new-products-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
    .new-products-scroll::-webkit-scrollbar { display: none; }
    .new-product-card { min-width: 160px; max-width: 160px; cursor: pointer; }
    .new-product-card .img-wrapper { width: 100%; aspect-ratio: 3/4; background: #f5f5f5; border-radius: 4px; overflow: hidden; }
    .new-product-card img { width: 100%; height: 100%; object-fit: cover; }
    .new-product-card .info { margin-top: 10px; }
    .new-product-card .name { font-size: 12px; font-weight: 600; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .new-product-card .price { font-size: 12px; color: var(--text-muted); }

    /* Categories */
    .category-tabs { display: flex; gap: 20px; overflow-x: auto; padding: 20px 0; border-bottom: 1px solid var(--border); scrollbar-width: none; }
    .category-tabs::-webkit-scrollbar { display: none; }
    .category-tab { font-size: 13px; font-weight: 600; text-transform: uppercase; color: #999; cursor: pointer; padding-bottom: 5px; border-bottom: 2px solid transparent; transition: 0.3s; white-space: nowrap; }
    .category-tab.active { color: var(--text); border-bottom: 2px solid var(--text); }

    /* Product Grid */
    .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 40px 0; }
    @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
    .product-card { position: relative; }
    .product-card.sold-out { opacity: 0.6; }
    .product-card .img-wrapper { width: 100%; aspect-ratio: 3/4; background: #f5f5f5; border-radius: 8px; overflow: hidden; position: relative; cursor: pointer; }
    .product-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
    .product-card:hover img { transform: scale(1.05); }
    .sold-out-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 4px 8px; font-size: 10px; font-weight: 700; border-radius: 4px; }
    .product-info { margin-top: 15px; }
    .product-name { font-size: 14px; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
    .product-price { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
    .add-btn { width: 100%; background: var(--text); color: white; border: none; padding: 12px; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 4px; }
    .add-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* Modals */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 12px; max-height: 90vh; overflow-y: auto; position: relative; }
    .close-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; background: none; border: none; cursor: pointer; }
    
    /* Cart Styles */
    .cart-items { margin: 20px 0; }
    .cart-item { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; border-bottom: 1px solid #f5f5f5; padding-bottom: 15px; }
    .cart-item img { width: 60px; height: 80px; object-fit: cover; border-radius: 4px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 13px; font-weight: 600; text-transform: uppercase; }
    .cart-item-price { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .remove-item { background: none; border: none; color: #999; cursor: pointer; font-size: 18px; }
    .cart-footer { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
    .cart-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 18px; margin-bottom: 20px; }
    .whatsapp-btn { width: 100%; background: #25D366; color: white; border: none; padding: 15px; font-size: 14px; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }

    /* Account Modal Notice */
    .account-notice { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; line-height: 1.6; color: #444; }
    .admin-login-link { text-align: center; margin-top: 20px; }
    .btn-text { background: none; border: none; text-decoration: underline; color: #999; cursor: pointer; font-size: 12px; }

    /* Admin Form */
    .account-form { display: grid; gap: 15px; margin-top: 20px; }
    .form-group { display: grid; gap: 5px; }
    .form-group label { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
    .account-form input, .account-form select, .account-form textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .btn-black { background: var(--text); color: white; border: none; padding: 15px; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 6px; }

    /* Mobile Nav */
    .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid var(--border); padding: 10px 0; z-index: 1000; justify-content: space-around; }
    @media (max-width: 768px) { .mobile-nav { display: flex; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">Really Brand</a>
        <div class="header-right" id="header-right">
          <!-- Admin button injected here -->
          <button class="icon-btn" onclick="openAccount()">👤</button>
          <button class="icon-btn cart-btn" onclick="openCart()">
            🛒 <span class="cart-count">0</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <section class="hero">
    <img src="hero-image.jpg" alt="Hero">
    <div class="hero-content">
      <h1 style="font-size: 48px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px;">New Era</h1>
    </div>
  </section>

  <main class="container">
    <section class="new-section" id="new-section">
      <h2>Новинки</h2>
      <div class="new-products-scroll" id="new-products-scroll">
        <!-- New items -->
      </div>
    </section>

    <section class="category-section">
      <div class="category-tabs" id="category-tabs">
        <span class="category-tab active" data-category="all">Все</span>
        <span class="category-tab" data-category="tops">Верхняя одежда</span>
        <span class="category-tab" data-category="bottoms">Брюки</span>
        <span class="category-tab" data-category="shoes">Обувь</span>
        <span class="category-tab" data-category="bags">Сумки</span>
      </div>
    </section>

    <section class="products">
      <div class="product-grid" id="product-grid">
        <!-- Products -->
      </div>
    </section>
  </main>

  <!-- Modals -->
  <div class="modal" id="account-modal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('account-modal')">×</button>
      <div id="account-modal-body"></div>
    </div>
  </div>

  <div class="modal" id="cart-modal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('cart-modal')">×</button>
      <h3 style="text-transform: uppercase; letter-spacing: 1px;">Корзина</h3>
      <div id="cart-items" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Итого</span>
          <span id="cart-total">₽ 0</span>
        </div>
        <button class="whatsapp-btn" onclick="sendWhatsApp()">
          Заказать через WhatsApp
        </button>
      </div>
    </div>
  </div>

  <div class="mobile-nav">
    <button class="icon-btn" onclick="location.href='index.html'">🏠</button>
    <button class="icon-btn" onclick="openAccount()">👤</button>
    <button class="icon-btn cart-btn" onclick="openCart()">
      🛒 <span class="cart-count">0</span>
    </button>
  </div>

  <footer style="padding: 60px 0; text-align: center; border-top: 1px solid var(--border); margin-top: 40px;">
    <p style="font-size: 12px; color: #999;">© 2026 Really Brand. Все права защищены.</p>
  </footer>

  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
