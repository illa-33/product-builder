<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Really Brand - Official Store</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #666666;
      --border: #e0e0e0;
      --hover: #f5f5f5;
      --accent: #000000;
      --primary: #000000;
      --success: #10b981;
      --danger: #ef4444;
      --shadow: rgba(0,0,0,0.05);
      --glass-bg: rgba(255, 255, 255, 0.8);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Header */
    header {
      background: var(--bg);
      border-bottom: 1px solid #f0f0f0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-btn {
      position: relative;
    }

    .cart-count {
      position: absolute;
      top: -5px;
      right: -10px;
      background: var(--text);
      color: white;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
    }

    /* Mobile Bottom Nav */
    .mobile-bottom-nav {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 500px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 12px 25px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      z-index: 2000;
      justify-content: space-between;
      align-items: center;
    }

    .mobile-bottom-nav .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text);
      text-decoration: none;
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
    }

    /* Hero Banner */
    .hero {
      position: relative;
      height: 60vh;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      color: white;
    }

    .hero-content h1 {
      font-size: 42px;
      margin-bottom: 15px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* Categories */
    .category-section {
      padding: 40px 0 20px;
    }

    .category-tabs {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      white-space: nowrap;
      padding-bottom: 10px;
      scrollbar-width: none; /* Firefox */
    }

    .category-tabs::-webkit-scrollbar {
      display: none; /* Chrome, Safari */
    }

    .category-tab {
      font-size: 14px;
      font-weight: 500;
      color: #999;
      cursor: pointer;
      text-transform: uppercase;
      padding-bottom: 5px;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
    }

    .category-tab.active {
      color: var(--text);
      border-bottom: 2px solid var(--text);
    }

    /* Products */
    .products {
      padding: 20px 0 80px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px 15px;
    }

    .product-card {
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 3/4;
      background: #f7f7f7;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-card:hover .product-image img {
      transform: scale(1.03);
    }

    .product-info {
      text-align: left;
    }

    .product-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text);
      text-transform: uppercase;
    }

    .product-price {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .product-color {
      font-size: 12px;
      color: #888;
    }

    /* Side Menu */
    .side-menu {
      position: fixed;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 3000;
      transition: left 0.4s cubic-bezier(0.77, 0, 0.175, 1);
      padding: 60px 40px;
    }

    .side-menu.open {
      left: 0;
    }

    .side-menu .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 30px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .side-menu ul {
      list-style: none;
      margin-top: 40px;
    }

    .side-menu li {
      margin-bottom: 25px;
    }

    .side-menu li a {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
    }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 4000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      padding: 40px;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .product-detail-image {
      width: 100%;
      aspect-ratio: 3/4;
      background: #f7f7f7;
      margin-bottom: 20px;
    }

    .product-detail-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-black {
      width: 100%;
      background: black;
      color: white;
      border: none;
      padding: 15px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 20px;
    }

    /* Search Overlay */
    .search-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 3500;
      display: none;
      padding: 40px;
    }

    .search-overlay.active {
      display: block;
    }

    .search-input-wrapper {
      display: flex;
      align-items: center;
      border-bottom: 2px solid black;
      padding-bottom: 10px;
    }

    .search-input-wrapper input {
      flex: 1;
      border: none;
      font-size: 24px;
      outline: none;
      font-weight: 600;
    }

    /* Footer */
    footer {
      padding: 60px 0;
      border-top: 1px solid #f0f0f0;
      text-align: center;
    }

    footer p {
      font-size: 12px;
      color: #999;
      letter-spacing: 0.5px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .product-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .header-content {
        padding: 12px 0;
      }
      .logo {
        font-size: 16px;
      }
      .header-right .icon-btn:not(.cart-btn) {
        display: none;
      }
      .hamburger {
        display: none !important;
      }
      .mobile-bottom-nav {
        display: flex;
      }
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px 10px;
      }
      .hero {
        height: 50vh;
      }
      .hero-content h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <div class="header-left">
          <button class="icon-btn hamburger" onclick="openSideMenu()">☰</button>
          <a href="#" class="logo">Really Brand</a>
        </div>
        <div class="header-right">
          <button class="icon-btn" onclick="toggleSearch()">🔍</button>
          <button class="icon-btn" onclick="openAccount()">👤</button>
          <button class="icon-btn cart-btn" onclick="openCart()">
            🛒
            <span class="cart-count" id="cart-count">0</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-bottom-nav">
    <button class="nav-item" onclick="openSideMenu()">☰</button>
    <button class="nav-item" onclick="toggleSearch()">🔍</button>
    <button class="nav-item" onclick="openAccount()">👤</button>
    <button class="nav-item cart-btn" onclick="openCart()">
      🛒
      <span class="cart-count" id="cart-count-mobile">0</span>
    </button>
  </nav>

  <div class="side-menu" id="side-menu">
    <button class="close-btn" onclick="closeSideMenu()">×</button>
    <ul>
      <li><a href="#" onclick="filterProducts('tops'); closeSideMenu();">Outerwear</a></li>
      <li><a href="#" onclick="filterProducts('bottoms'); closeSideMenu();">Trousers</a></li>
      <li><a href="#" onclick="filterProducts('shoes'); closeSideMenu();">Shoes</a></li>
      <li><a href="#" onclick="filterProducts('bags'); closeSideMenu();">Bags</a></li>
    </ul>
  </div>

  <div class="search-overlay" id="search-overlay">
    <button class="modal-close" onclick="toggleSearch()">×</button>
    <div class="search-input-wrapper">
      <input type="text" id="search-input" placeholder="SEARCH..." oninput="searchProducts()">
    </div>
  </div>

  <section class="hero">
    <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600&q=80" alt="Hero">
    <div class="hero-content">
      <h1>New Collection</h1>
    </div>
  </section>

  <div class="category-section">
    <div class="container">
      <div class="category-tabs" id="category-tabs">
        <span class="category-tab active" data-category="all" onclick="filterProducts('all')">All</span>
        <span class="category-tab" data-category="tops" onclick="filterProducts('tops')">Outerwear</span>
        <span class="category-tab" data-category="bottoms" onclick="filterProducts('bottoms')">Trousers</span>
        <span class="category-tab" data-category="shoes" onclick="filterProducts('shoes')">Shoes</span>
        <span class="category-tab" data-category="bags" onclick="filterProducts('bags')">Bags</span>
      </div>
    </div>
  </div>

  <section class="products" id="products">
    <div class="container">
      <div class="product-grid" id="product-grid">
        <!-- Products populated by JS -->
      </div>
    </div>
  </section>

  <!-- Product Modal -->
  <div class="modal" id="product-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('product-modal')">×</button>
      <div id="product-modal-body"></div>
      <button class="btn-black" onclick="addToCartFromModal()">Add to Bag</button>
    </div>
  </div>

  <!-- Cart Modal -->
  <div class="modal" id="cart-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('cart-modal')">×</button>
      <h3>SHOPPING BAG</h3>
      <div id="cart-items" style="margin-top: 20px;"></div>
      <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
        <div style="display: flex; justify-content: space-between; font-weight: 700;">
          <span>TOTAL</span>
          <span id="cart-total">₩ 0</span>
        </div>
        <button class="btn-black" onclick="checkout()">Checkout</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>&copy; 2026 REALLY BRAND. ALL RIGHTS RESERVED.</p>
    </div>
  </footer>

  <script>
    const products = [
      { id: 1, category: 'tops', title: 'Technical Jacket', price: 1250000, color: 'Black', image: 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=800&q=80' },
      { id: 2, category: 'tops', title: 'Lightweight Puffer', price: 1850000, color: 'Navy', image: 'https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=800&q=80' },
      { id: 3, category: 'tops', title: 'Wool Blend Coat', price: 2450000, color: 'Camel', image: 'https://images.unsplash.com/photo-1539533377285-b0bd362eb23d?w=800&q=80' },
      { id: 4, category: 'bottoms', title: 'Slim Fit Trousers', price: 450000, color: 'Dark Grey', image: 'https://images.unsplash.com/photo-1624371414361-e6e8ea02c1e2?w=800&q=80' },
      { id: 5, category: 'bottoms', title: 'Cotton Chinos', price: 380000, color: 'Beige', image: 'https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=800&q=80' },
      { id: 6, category: 'shoes', title: 'Leather Sneakers', price: 750000, color: 'White', image: 'https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=800&q=80' },
      { id: 7, category: 'shoes', title: 'Chelsea Boots', price: 950000, color: 'Black', image: 'https://images.unsplash.com/photo-1638247025967-b4e38f787b76?w=800&q=80' },
      { id: 8, category: 'bags', title: 'Nylon Backpack', price: 1100000, color: 'Black', image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=800&q=80' }
    ];

    let cart = [];
    let currentProduct = null;
    let currentFilter = 'all';
    let searchQuery = '';

    document.addEventListener('DOMContentLoaded', () => {
      renderProducts();
    });

    function openSideMenu() { document.getElementById('side-menu').classList.add('open'); }
    function closeSideMenu() { document.getElementById('side-menu').classList.remove('open'); }

    function toggleSearch() {
      const overlay = document.getElementById('search-overlay');
      overlay.classList.toggle('active');
      if(overlay.classList.contains('active')) {
        document.getElementById('search-input').focus();
      } else {
        searchQuery = '';
        renderProducts();
      }
    }

    function searchProducts() {
      searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
      renderProducts();
    }

    function filterProducts(category) {
      currentFilter = category;
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.category === category);
      });
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      const filtered = products
        .filter(p => currentFilter === 'all' || p.category === currentFilter)
        .filter(p => p.title.toLowerCase().includes(searchQuery));

      grid.innerHTML = filtered.map(p => `
        <div class="product-card" onclick="openProductModal(${p.id})">
          <div class="product-image">
            <img src="${p.image}" alt="${p.title}">
          </div>
          <div class="product-info">
            <div class="product-title">${p.title}</div>
            <div class="product-price">₩ ${p.price.toLocaleString()}</div>
            <div class="product-color">${p.color}</div>
          </div>
        </div>
      `).join('');
    }

    function openProductModal(id) {
      currentProduct = products.find(p => p.id === id);
      const body = document.getElementById('product-modal-body');
      body.innerHTML = `
        <div class="product-detail-image"><img src="${currentProduct.image}"></div>
        <h2 style="text-transform:uppercase;">${currentProduct.title}</h2>
        <p style="margin:10px 0;">₩ ${currentProduct.price.toLocaleString()}</p>
        <p style="color:#888;">Color: ${currentProduct.color}</p>
      `;
      document.getElementById('product-modal').classList.add('active');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function addToCartFromModal() {
      const existing = cart.find(item => item.id === currentProduct.id);
      if(existing) existing.quantity++;
      else cart.push({...currentProduct, quantity: 1});
      updateCartUI();
      closeModal('product-modal');
    }

    function updateCartUI() {
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cart-count').textContent = count;
      document.getElementById('cart-count-mobile').textContent = count;

      const itemsContainer = document.getElementById('cart-items');
      itemsContainer.innerHTML = cart.map(item => `
        <div style="display:flex; gap:15px; margin-bottom:15px;">
          <img src="${item.image}" style="width:60px; height:80px; object-fit:cover;">
          <div>
            <div style="font-weight:600; font-size:12px;">${item.title}</div>
            <div style="font-size:12px;">₩ ${item.price.toLocaleString()} x ${item.quantity}</div>
          </div>
        </div>
      `).join('');

      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      document.getElementById('cart-total').textContent = `₩ ${total.toLocaleString()}`;
    }

    function openCart() { document.getElementById('cart-modal').classList.add('active'); }
    function openAccount() { alert('Login coming soon'); }
    function checkout() { alert('Checkout process started'); }
  </script>
</body>
</html>
