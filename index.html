<html lang="ru"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Really Brand - Official Store</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #666666;
      --border: #e0e0e0;
      --hover: #f5f5f5;
      --accent: #000000;
      --primary: #000000;
      --success: #10b981;
      --danger: #ef4444;
      --shadow: rgba(0,0,0,0.05);
      --glass-bg: rgba(255, 255, 255, 0.8);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Header */
    header {
      background: var(--bg);
      border-bottom: 1px solid #f0f0f0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-btn {
      position: relative;
    }

    .cart-count {
      position: absolute;
      top: -5px;
      right: -10px;
      background: var(--text);
      color: white;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
    }

    /* Mobile Bottom Nav */
    .mobile-bottom-nav {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 500px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 12px 25px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      z-index: 2000;
      justify-content: space-between;
      align-items: center;
    }

    .mobile-bottom-nav .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text);
      text-decoration: none;
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
    }

    /* Hero Banner */
    .hero {
      position: relative;
      height: 60vh;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      color: white;
    }

    .hero-content h1 {
      font-size: 42px;
      margin-bottom: 15px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* Categories */
    .category-section {
      padding: 40px 0 20px;
    }

    .category-tabs {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      white-space: nowrap;
      padding-bottom: 10px;
      scrollbar-width: none; /* Firefox */
    }

    .category-tabs::-webkit-scrollbar {
      display: none; /* Chrome, Safari */
    }

    .category-tab {
      font-size: 14px;
      font-weight: 500;
      color: #999;
      cursor: pointer;
      text-transform: uppercase;
      padding-bottom: 5px;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
    }

    .category-tab.active {
      color: var(--text);
      border-bottom: 2px solid var(--text);
    }

    /* Products */
    .products {
      padding: 20px 0 80px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px 15px;
    }

    .product-card {
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 3/4;
      background: #f7f7f7;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-card:hover .product-image img {
      transform: scale(1.03);
    }

    .product-info {
      text-align: left;
    }

    .product-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text);
      text-transform: uppercase;
    }

    .product-price {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .product-color {
      font-size: 12px;
      color: #888;
    }

    /* Side Menu */
    .side-menu {
      position: fixed;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 3000;
      transition: left 0.4s cubic-bezier(0.77, 0, 0.175, 1);
      padding: 60px 40px;
    }

    .side-menu.open {
      left: 0;
    }

    .side-menu .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 30px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .side-menu ul {
      list-style: none;
      margin-top: 40px;
    }

    .side-menu li {
      margin-bottom: 25px;
    }

    .side-menu li a {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
    }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 4000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      padding: 40px;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .product-detail-image {
      width: 100%;
      aspect-ratio: 3/4;
      background: #f7f7f7;
      margin-bottom: 20px;
    }

    .product-detail-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-black {
      width: 100%;
      background: black;
      color: white;
      border: none;
      padding: 15px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 20px;
    }

    /* Search Overlay */
    .search-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 3500;
      display: none;
      padding: 40px;
    }

    .search-overlay.active {
      display: block;
    }

    .search-input-wrapper {
      display: flex;
      align-items: center;
      border-bottom: 2px solid black;
      padding-bottom: 10px;
    }

    .search-input-wrapper input {
      flex: 1;
      border: none;
      font-size: 24px;
      outline: none;
      font-weight: 600;
    }

    .account-tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .account-tab {
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      color: #444;
      opacity: 0.7;
    }

    .account-tab.active {
      color: var(--text);
      opacity: 1;
      text-decoration: underline;
    }

    .account-form {
      display: grid;
      gap: 16px;
    }

    .account-form input,
    .account-form select {
      width: 100%;
      border: 1px solid #ddd;
      padding: 12px 14px;
      font-size: 14px;
      border-radius: 8px;
    }

    .account-form button {
      border: none;
      background: var(--text);
      color: white;
      padding: 14px;
      font-size: 14px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 8px;
    }

    .account-form button.secondary {
      background: transparent;
      border: 1px solid var(--text);
      color: var(--text);
    }

    .account-note {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }

    .account-message {
      font-size: 14px;
      color: var(--danger);
      min-height: 22px;
    }

    .admin-panel {
      display: grid;
      gap: 24px;
    }

    .admin-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .admin-controls button {
      border: 1px solid #000;
      background: transparent;
      color: #000;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      border-radius: 8px;
    }

    .admin-panel section {
      border: 1px solid #eee;
      padding: 20px;
      border-radius: 16px;
      background: #fafafa;
    }

    .admin-panel table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .admin-panel th,
    .admin-panel td {
      border: 1px solid #eee;
      padding: 10px;
      text-align: left;
    }

    .admin-panel th {
      background: #f4f4f4;
      font-weight: 700;
    }

    .admin-action {
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      font-size: 12px;
    }

    /* Footer */
    footer {
      padding: 60px 0;
      border-top: 1px solid #f0f0f0;
      text-align: center;
    }

    footer p {
      font-size: 12px;
      color: #999;
      letter-spacing: 0.5px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .product-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .header-content {
        padding: 12px 0;
      }
      .logo {
        font-size: 16px;
      }
      .header-right .icon-btn:not(.cart-btn) {
        display: none;
      }
      .header-right .cart-btn {
        display: none;
      }
      .hamburger {
        display: none !important;
      }
      .mobile-bottom-nav {
        display: flex;
      }
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px 10px;
      }
      .hero {
        height: 50vh;
      }
      .hero-content h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <div class="header-left">
          <button class="icon-btn hamburger" onclick="openSideMenu()">☰</button>
          <a href="#" class="logo">Really Brand</a>
        </div>
        <div class="header-right">
          <button class="icon-btn" onclick="toggleSearch()">🔍</button>
          <button class="icon-btn" onclick="openAccount()">👤</button>
          <button class="icon-btn cart-btn" onclick="openCart()">
            🛒
            <span class="cart-count" id="cart-count">1</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-bottom-nav">
    <button class="nav-item" onclick="openSideMenu()">☰</button>
    <button class="nav-item" onclick="toggleSearch()">🔍</button>
    <button class="nav-item" onclick="openAccount()">👤</button>
    <button class="nav-item cart-btn" onclick="openCart()">
      🛒
      <span class="cart-count" id="cart-count-mobile">1</span>
    </button>
  </nav>

  <div class="side-menu" id="side-menu">
    <button class="close-btn" onclick="closeSideMenu()">×</button>
    <ul>
      <li><a href="#" onclick="filterProducts('tops'); closeSideMenu();">Верхняя одежда</a></li>
      <li><a href="#" onclick="filterProducts('bottoms'); closeSideMenu();">Брюки</a></li>
      <li><a href="#" onclick="filterProducts('shoes'); closeSideMenu();">Обувь</a></li>
      <li><a href="#" onclick="filterProducts('bags'); closeSideMenu();">Сумки</a></li>
    </ul>
  </div>

  <div class="search-overlay" id="search-overlay">
    <button class="modal-close" onclick="toggleSearch()">×</button>
    <div class="search-input-wrapper">
      <input type="text" id="search-input" placeholder="Поиск..." oninput="searchProducts()">
    </div>
  </div>

  <div class="modal" id="account-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('account-modal')">×</button>
      <div id="account-modal-body"></div>
    </div>
  </div>

  <section class="hero">
    <img src="https://raw.githubusercontent.com/illa-33/product-builder/main/hero-image.jpg" alt="Original Mens">
    <div class="hero-content">
      <h1></h1>
      <p></p>
      <button class="btn-black" onclick="filterProducts('all'); closeSideMenu();">Посмотреть коллекцию</button>
    </div>
  </section>

  <section class="category-section">
    <div class="container">
      <div class="category-tabs" id="category-tabs">
        <span class="category-tab active" data-category="all" onclick="filterProducts('all')">Все</span>
        <span class="category-tab" data-category="tops" onclick="filterProducts('tops')">Верхняя одежда</span>
        <span class="category-tab" data-category="bottoms" onclick="filterProducts('bottoms')">Брюки</span>
        <span class="category-tab" data-category="shoes" onclick="filterProducts('shoes')">Обувь</span>
        <span class="category-tab" data-category="bags" onclick="filterProducts('bags')">Сумки</span>
      </div>
    </div>
  </section>

  <section class="products" id="products">
    <div class="container">
      <div class="product-grid" id="product-grid"></div>
    </div>
  </section>

  <!-- Product Modal -->
  <div class="modal" id="product-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('product-modal')">×</button>
      <div id="product-modal-body"></div>
      <button class="btn-black" onclick="addToCartFromModal()">В корзину</button>
    </div>
  </div>

  <!-- Cart Modal -->
  <div class="modal" id="cart-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('cart-modal')">×</button>
      <h3>КОРЗИНА</h3>
      <div id="cart-items" style="margin-top: 20px;"></div>
      <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
        <div style="display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 8px;">
          <span>Товары</span>
          <span id="cart-subtotal">₽ 0</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span>Доставка</span>
          <span id="cart-shipping">₽ 0</span>
        </div>
        <div style="display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 20px;">
          <span>Итого</span>
          <span id="cart-total">₽ 0</span>
        </div>
        <button class="btn-black" onclick="checkout()">Оформить заказ</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>© 2026 ОРИГИНАЛ МЕНС. Все права защищены.</p>
    </div>
  </footer>

  <script>
    const usersKey = 'rb_users';
    const ordersKey = 'rb_orders';
    const productsKey = 'rb_products';
    const defaultProducts = [
      { id: 1, category: 'tops', title: 'Техническая куртка', price: 1250000, color: 'Чёрный', image: 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=800&q=80', images: ['https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=800&q=80'], options: { colors: ['Чёрный'], sizes: ['S', 'M', 'L', 'XL'] } },
      { id: 2, category: 'tops', title: 'Лёгкий пуховик', price: 1850000, color: 'Синий', image: 'https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=800&q=80', images: ['https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=800&q=80'], options: { colors: ['Синий'], sizes: ['M', 'L', 'XL'] } },
      { id: 3, category: 'tops', title: 'Пальто из шерсти', price: 2450000, color: 'Кэмел', image: 'https://images.unsplash.com/photo-1539533377285-b0bd362eb23d?w=800&q=80', images: ['https://images.unsplash.com/photo-1539533377285-b0bd362eb23d?w=800&q=80'], options: { colors: ['Кэмел'], sizes: ['L', 'XL'] } },
      { id: 4, category: 'bottoms', title: 'Брюки узкого кроя', price: 450000, color: 'Тёмно-серый', image: 'https://images.unsplash.com/photo-1624371414361-e6e8ea02c1e2?w=800&q=80', images: ['https://images.unsplash.com/photo-1624371414361-e6e8ea02c1e2?w=800&q=80'], options: { colors: ['Тёмно-серый'], sizes: ['30', '32', '34', '36'] } },
      { id: 5, category: 'bottoms', title: 'Хлопковые чиносы', price: 380000, color: 'Бежевый', image: 'https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=800&q=80', images: ['https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=800&q=80'], options: { colors: ['Бежевый'], sizes: ['30', '32', '34'] } },
      { id: 6, category: 'shoes', title: 'Кожаные кроссовки', price: 750000, color: 'Белый', image: 'https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=800&q=80', images: ['https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=800&q=80'], options: { colors: ['Белый'], sizes: ['40', '41', '42', '43', '44'] } },
      { id: 7, category: 'shoes', title: 'Ботинки челси', price: 950000, color: 'Чёрный', image: 'https://images.unsplash.com/photo-1638247025967-b4e38f787b76?w=800&q=80', images: ['https://images.unsplash.com/photo-1638247025967-b4e38f787b76?w=800&q=80'], options: { colors: ['Чёрный'], sizes: ['40', '41', '42', '43'] } },
      { id: 8, category: 'bags', title: 'Нейлоновый рюкзак', price: 1100000, color: 'Чёрный', image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=800&q=80', images: ['https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=800&q=80'], options: { colors: ['Чёрный'], sizes: ['One Size'] } }
    ];

    let products = loadProducts();

    let cart = [];
    let currentProduct = null;
    let currentFilter = 'all';
    let searchQuery = '';
    let loggedInUser = null;
    let adminSection = 'products';
    let currentImageIndex = 0;

    function loadUsers() {
      const stored = localStorage.getItem(usersKey);
      return stored ? JSON.parse(stored) : defaultUsers.slice();
    }

    function saveUsers(users) {
      localStorage.setItem(usersKey, JSON.stringify(users));
    }

    function loadProducts() {
      const stored = localStorage.getItem(productsKey);
      return stored ? JSON.parse(stored) : defaultProducts.slice();
    }

    function saveProducts(prods) {
      localStorage.setItem(productsKey, JSON.stringify(prods));
    }

    function loadOrders() {
      const stored = localStorage.getItem(ordersKey);
      return stored ? JSON.parse(stored) : [];
    }

    function saveOrders(orders) {
      localStorage.setItem(ordersKey, JSON.stringify(orders));
    }

    function getUsers() {
      const users = loadUsers();
      if (!users || users.length === 0) {
        saveUsers(defaultUsers);
        return defaultUsers.slice();
      }
      return users;
    }

    function getOrders() {
      return loadOrders();
    }

    function showNotification(message) {
      alert(message);
    }

    function openSideMenu() {
      document.getElementById('side-menu').classList.add('open');
    }

    function closeSideMenu() {
      document.getElementById('side-menu').classList.remove('open');
    }

    function toggleSearch() {
      const overlay = document.getElementById('search-overlay');
      overlay.classList.toggle('active');
      if (!overlay.classList.contains('active')) {
        document.getElementById('search-input').value = '';
        searchQuery = '';
        renderProducts();
      }
    }

    function filterProducts(category) {
      currentFilter = category;
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.category === category);
      });
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      const filtered = products
        .filter(p => currentFilter === 'all' || p.category === currentFilter)
        .filter(p => p.title.toLowerCase().includes(searchQuery));

      grid.innerHTML = filtered.map(p => `
        <div class="product-card" onclick="openProductModal(${p.id})">
          <div class="product-image">
            <img src="${p.image}" alt="${p.title}">
          </div>
          <div class="product-info">
            <div class="product-title">${p.title}</div>
            <div class="product-price">₽ ${p.price.toLocaleString()}</div>
            <div class="product-color">${p.color}</div>
          </div>
        </div>
      `).join('');
    }

    function openProductModal(id) {
      currentProduct = products.find(p => p.id === id);
      currentImageIndex = 0;
      const body = document.getElementById('product-modal-body');
      body.innerHTML = `
        <div class="product-detail-image" style="position:relative; overflow:hidden;">
          <div id="image-container" style="display:flex; transition:transform 0.3s;">
            ${currentProduct.images.map(img => `<img src="${img}" alt="${currentProduct.title}" style="width:100%; height:auto; flex-shrink:0;">`).join('')}
          </div>
          ${currentProduct.images.length > 1 ? `
            <button onclick="prevImage()" style="position:absolute; top:50%; left:10px; transform:translateY(-50%); background:none; border:none; font-size:24px; cursor:pointer;">‹</button>
            <button onclick="nextImage()" style="position:absolute; top:50%; right:10px; transform:translateY(-50%); background:none; border:none; font-size:24px; cursor:pointer;">›</button>
            <div style="text-align:center; margin-top:10px;">
              ${currentProduct.images.map((_, index) => `<span class="dot ${index === 0 ? 'active' : ''}" onclick="changeImage(${index})" style="height:10px; width:10px; margin:0 2px; background-color:#bbb; border-radius:50%; display:inline-block; cursor:pointer;"></span>`).join('')}
            </div>
          ` : ''}
        </div>
        <h2 style="text-transform:uppercase; margin-bottom:10px;">${currentProduct.title}</h2>
        <p style="margin:10px 0;">₽ ${currentProduct.price.toLocaleString()}</p>
        <p style="color:#888; margin-bottom:10px;">Цвет: ${currentProduct.color}</p>
        ${currentProduct.options ? `
          <p style="color:#888; margin-bottom:10px;">Цвета: ${currentProduct.options.colors.join(', ')}</p>
          <p style="color:#888; margin-bottom:20px;">Размеры: ${currentProduct.options.sizes.join(', ')}</p>
        ` : ''}
      `;
      document.getElementById('product-modal').classList.add('active');
    }

    function addToCartFromModal() {
      if (!currentProduct) return;
      addToCart(currentProduct.id, 1);
      closeModal('product-modal');
    }

    function addToCart(productId, quantity = 1) {
      const product = products.find(p => p.id === productId);
      if (!product) return;
      const existing = cart.find(item => item.id === productId);
      if (existing) {
        existing.quantity += quantity;
      } else {
        cart.push({ ...product, quantity });
      }
      updateCartUI();
      showNotification('Товар добавлен в корзину');
    }

    function updateCartUI() {
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cart-count').textContent = count;
      document.getElementById('cart-count-mobile').textContent = count;
      const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const shipping = 500; // 무조건 500루블
      const total = subtotal + shipping;
      document.getElementById('cart-subtotal').textContent = `₽ ${subtotal.toLocaleString()}`;
      document.getElementById('cart-shipping').textContent = `₽ ${shipping.toLocaleString()} (Доставка)`;
      document.getElementById('cart-total').textContent = `₽ ${total.toLocaleString()}`;
    }

    function openCart() {
      renderCartItems();
      updateCartUI();
      document.getElementById('cart-modal').classList.add('active');
    }

    function renderCartItems() {
      const container = document.getElementById('cart-items');
      if (!cart.length) {
        container.innerHTML = '<p>Корзина пуста</p>';
        return;
      }
      container.innerHTML = cart.map(item => `
        <div style="display:flex; gap:15px; margin-bottom:15px; align-items:center;">
          <img src="${item.image}" style="width:60px; height:80px; object-fit:cover; border-radius:8px;">
          <div style="flex:1;">
            <div style="font-weight:600; font-size:12px;">${item.title}</div>
            <div style="font-size:12px;">₽ ${item.price.toLocaleString()} x ${item.quantity}</div>
          </div>
          <button class="admin-action" style="font-size:12px;" onclick="removeFromCart(${item.id})">Удалить</button>
        </div>
      `).join('');
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      updateCartUI();
      renderCartItems();
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
    }

    function openAccount() {
      renderAccountModal();
      document.getElementById('account-modal').classList.add('active');
    }

    function logout() {
      loggedInUser = null;
      renderAccountModal();
      showNotification('Вы вышли из системы');
      closeModal('account-modal');
    }

    function renderAccountModal() {
      const body = document.getElementById('account-modal-body');
      if (!body) return;
      if (loggedInUser) {
        body.innerHTML = `
          <div class="account-tabs">
            <span class="account-tab active">Привет, ${loggedInUser.name}</span>
          </div>
          ${loggedInUser.role === 'admin' ? renderAdminPanel() : renderUserPanel()}
        `;
        return;
      }
      body.innerHTML = `
        <div class="account-tabs">
          <span class="account-tab active" id="login-tab" onclick="switchAuthTab('login')">Вход</span>
          <span class="account-tab" id="signup-tab" onclick="switchAuthTab('signup')">Регистрация</span>
        </div>
        <div id="auth-form" class="account-form"></div>
        <div class="account-message" id="auth-message"></div>
      `;
      switchAuthTab('login');
    }

    function switchAuthTab(tab) {
      const loginTab = document.getElementById('login-tab');
      const signupTab = document.getElementById('signup-tab');
      loginTab.classList.toggle('active', tab === 'login');
      signupTab.classList.toggle('active', tab === 'signup');
      const form = document.getElementById('auth-form');
      const message = document.getElementById('auth-message');
      message.textContent = '';
      if (tab === 'login') {
        form.innerHTML = `
          <input id="login-username" placeholder="Имя пользователя или email" />
          <input id="login-password" type="password" placeholder="Пароль" />
          <button onclick="submitLogin()">Войти</button>
          <button class="secondary" onclick="instagramLogin()">Войти через Instagram</button>
          <p class="account-note">Можно войти с админом islam0814 / islam01068448600</p>
        `;
      } else {
        form.innerHTML = `
          <input id="signup-name" placeholder="Ваше имя" />
          <input id="signup-email" type="email" placeholder="Email" />
          <input id="signup-username" placeholder="Имя пользователя" />
          <input id="signup-password" type="password" placeholder="Пароль" />
          <button onclick="submitSignup()">Зарегистрироваться</button>
          <p class="account-note">Регистрация выполняется локально и с помощью демонстрационного API.</p>
        `;
      }
    }

    function submitLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const message = document.getElementById('auth-message');
      if (!username || !password) {
        message.textContent = 'Введите имя пользователя и пароль';
        return;
      }
      const user = authenticateUser(username, password);
      if (!user) {
        message.textContent = 'Неверное имя пользователя или пароль';
        return;
      }
      loggedInUser = user;
      showNotification(`Добро пожаловать, ${user.name}`);
      renderAccountModal();
    }

    async function submitSignup() {
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const username = document.getElementById('signup-username').value.trim();
      const password = document.getElementById('signup-password').value.trim();
      const message = document.getElementById('auth-message');
      if (!name || !email || !username || !password) {
        message.textContent = 'Заполните все поля';
        return;
      }
      const users = getUsers();
      if (users.some(u => u.username === username || u.email === email)) {
        message.textContent = 'Пользователь с таким именем или email уже существует';
        return;
      }
      const newUser = { username, password, role: 'customer', name, email };
      users.push(newUser);
      saveUsers(users);
      try {
        await fetch('https://reqres.in/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
      } catch (e) {
        console.warn('Signup API unavailable, registered locally');
      }
      loggedInUser = newUser;
      showNotification('Регистрация прошла успешно');
      renderAccountModal();
    }

    function instagramLogin() {
      const popup = window.open('https://www.instagram.com/accounts/login/', 'InstagramLogin', 'width=600,height=700');
      setTimeout(() => {
        if (popup && !popup.closed) popup.close();
        const users = getUsers();
        let instaUser = users.find(u => u.username === 'insta_user');
        if (!instaUser) {
          instaUser = { username: 'insta_user', password: 'instagram', role: 'customer', name: 'Instagram Пользователь', email: 'insta@originalmens.ru' };
          users.push(instaUser);
          saveUsers(users);
        }
        loggedInUser = instaUser;
        showNotification('Вход через Instagram выполнен');
        renderAccountModal();
      }, 1500);
    }

    function authenticateUser(username, password) {
      const users = getUsers();
      return users.find(user => (user.username === username || user.email === username) && user.password === password);
    }

    function renderUserPanel() {
      return `
        <div class="account-form">
          <div>Здравствуйте, ${loggedInUser.name}</div>
          <div>Email: ${loggedInUser.email}</div>
          <button onclick="logout()">Выйти</button>
        </div>
      `;
    }

    function renderAdminPanel() {
      const orders = getOrders();
      const users = getUsers();
      return `
        <div class="admin-panel">
          <div class="admin-controls">
            <button onclick="setAdminSection('products')">Товары</button>
            <button onclick="setAdminSection('orders')">Заказы</button>
            <button onclick="setAdminSection('members')">Пользователи</button>
          </div>
          ${adminSection === 'products' ? renderAdminProducts() : ''}
          ${adminSection === 'orders' ? renderAdminOrders(orders) : ''}
          ${adminSection === 'members' ? renderAdminMembers(users) : ''}
          <button onclick="logout()">Выйти</button>
        </div>
      `;
    }

    function setAdminSection(section) {
      adminSection = section;
      renderAccountModal();
    }

    function renderAdminProducts() {
      return `
        <section>
          <h4>Управление товарами</h4>
          <form class="account-form" onsubmit="event.preventDefault(); addNewProduct();">
            <input id="new-title" placeholder="Название товара" />
            <input id="new-price" type="number" placeholder="Цена ₽" />
            <input id="new-color" placeholder="Цвет" />
            <input id="new-image" placeholder="URL изображения (или выберите файл)" />
            <input type="file" id="new-image-file" accept="image/*,video/*" multiple />
            <input id="new-colors" placeholder="Цвета (через запятую)" />
            <input id="new-sizes" placeholder="Размеры (через запятую)" />
            <select id="new-category">
              <option value="tops">Верхняя одежда</option>
              <option value="bottoms">Брюки</option>
              <option value="shoes">Обувь</option>
              <option value="bags">Сумки</option>
            </select>
            <button type="submit">Добавить товар</button>
          </form>
        </section>
      `;
    }

    function renderAdminOrders(orders) {
      if (!orders.length) {
        return `<section><h4>Заказы</h4><p>Заказов нет</p></section>`;
      }
      return `
        <section>
          <h4>Управление заказами</h4>
          <table>
            <thead><tr><th>ID</th><th>Пользователь</th><th>Товаров</th><th>Сумма</th><th>Статус</th></tr></thead>
            <tbody>
              ${orders.map((order, index) => `<tr><td>${index + 1}</td><td>${order.user}</td><td>${order.items.length}</td><td>₽ ${order.total.toLocaleString()}</td><td>${order.status}</td></tr>`).join('')}
            </tbody>
          </table>
        </section>
      `;
    }

    function renderAdminMembers(users) {
      return `
        <section>
          <h4>Управление пользователями</h4>
          <table>
            <thead><tr><th>Имя</th><th>Email</th><th>Роль</th><th>Действие</th></tr></thead>
            <tbody>
              ${users.map(user => `<tr><td>${user.name}</td><td>${user.email}</td><td>${user.role}</td><td>${user.username !== 'islam0814' ? `<button class="admin-action" onclick="deleteUser('${user.username}')">Удалить</button>` : '---'}</td></tr>`).join('')}
            </tbody>
          </table>
        </section>
      `;
    }

    function addNewProduct() {
      const title = document.getElementById('new-title').value.trim();
      const price = Number(document.getElementById('new-price').value);
      const color = document.getElementById('new-color').value.trim();
      const imageUrl = document.getElementById('new-image').value.trim();
      const imageFile = document.getElementById('new-image-file').files;
      const colorsInput = document.getElementById('new-colors').value.trim();
      const sizesInput = document.getElementById('new-sizes').value.trim();
      const category = document.getElementById('new-category').value;

      let images = [];
      if (imageUrl) {
        images.push(imageUrl);
      }
      if (imageFile.length > 0) {
        for (let file of imageFile) {
          const url = URL.createObjectURL(file);
          images.push(url);
        }
      }
      if (images.length === 0) {
        showNotification('Добавьте изображение (URL или файл)');
        return;
      }

      const colors = colorsInput ? colorsInput.split(',').map(c => c.trim()) : [color];
      const sizes = sizesInput ? sizesInput.split(',').map(s => s.trim()) : ['One Size'];

      if (!title || !price || colors.length === 0) {
        showNotification('Заполните все поля товара');
        return;
      }

      const maxId = products.reduce((max, item) => Math.max(max, item.id), 0);
      products.push({
        id: maxId + 1,
        category,
        title,
        price,
        color: colors[0],
        image: images[0],
        images,
        options: { colors, sizes }
      });
      saveProducts(products);
      renderProducts();
      showNotification('Товар добавлен');
      renderAccountModal();
    }

    function checkout() {
      if (!loggedInUser) {
        showNotification('Пожалуйста, войдите, чтобы оформить заказ');
        return;
      }
      if (!cart.length) {
        showNotification('Ваша корзина пуста');
        return;
      }
      const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const shipping = 500; // 무조건 500루블
      const total = subtotal + shipping;
      const orders = getOrders();
      orders.push({ user: loggedInUser.username, items: cart.slice(), subtotal, shipping, total, status: 'Новый' });
      saveOrders(orders);
      cart = [];
      updateCartUI();
      renderCartItems();
      showNotification('Заказ оформлен. Спасибо!');
      closeModal('cart-modal');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderProducts();
      updateCartUI();
    });
  </script>
</body>
</html>500; // 무조건 500루블
